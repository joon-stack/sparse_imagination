defaults:
  - _self_
  - env: point_maze
  - encoder: dinov1
  - action_encoder: proprio
  - proprio_encoder: proprio
  - decoder: vqvae
  - predictor: vit_nope

# Checkpoints are saved to ${ckpt_base_path}/outputs/<hydra-run-dir>.
ckpt_base_path: ${oc.env:DINO_WM_RUN_DIR,./runs}

hydra:
  run:
    dir: ${ckpt_base_path}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${ckpt_base_path}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

training:
  seed: 0
  epochs: 100
  batch_size: 32
  save_every_x_epoch: 10
  save_every_x_steps: null
  reconstruct_every_x_batch: 500
  num_reconstruct_samples: 6
  encoder_lr: 1e-6
  decoder_lr: 3e-4
  predictor_lr: 5e-4
  action_encoder_lr: 5e-4

img_size: 224
frameskip: 5
concat_dim: 1
normalize_action: true

action_emb_dim: 10
num_action_repeat: 1
proprio_emb_dim: 10
num_proprio_repeat: 1

num_hist: 3
num_pred: 1
has_predictor: true
has_decoder: true

model:
  _target_: models.visual_world_model.VWorldModel
  image_size: ${img_size}
  num_hist: ${num_hist}
  num_pred: ${num_pred}
  train_encoder: false
  train_predictor: true
  train_decoder: true

debug: false

# Random baseline default. Use drop_rate_ub=null for Full/CLS training.
drop_rate_ub: 0.5
